<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Hệ Thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h3 class="text-center text-primary mb-4">Đăng Nhập</h3>
                <input type="text" id="username" class="form-control mb-3" placeholder="Tên đăng nhập (VD: bacsi1)">
                <input type="password" id="password" class="form-control mb-3" placeholder="Mật khẩu (VD: 123456)">
                <button class="btn btn-primary w-100" onclick="login()">Đăng Nhập</button>
                <p id="error-msg" class="text-danger mt-2 text-center" style="display: none;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    function login() {
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (!res.ok) throw new Error('Sai tài khoản hoặc mật khẩu');
            return res.json();
        })
        .then(user => {
    // 1. Đổi lại tên biến cho khớp 100% với Java gửi lên (MaNV, MaQuyen)
    localStorage.setItem('userId', user.MaNV);
    localStorage.setItem('role', user.MaQuyen);
    localStorage.setItem('userName', user.TenNhanVien); // Lưu thêm tên để sau này hiện "Xin chào bác sĩ..."

    // 2. Phân luồng trang web dựa vào MaQuyen
    if (user.MaQuyen === 'BACSI' || user.MaQuyen === 'ADMIN') {
        window.location.href = 'doctor_dashboard.html'; // Lưu ý: Mình bỏ dấu '/' ở đầu đi để tránh lỗi đường dẫn nhé
    } else {
        window.location.href = 'patient_dashboard.html';
    }
})
        .catch(err => {
            document.getElementById('error-msg').innerText = err.message;
            document.getElementById('error-msg').style.display = 'block';
        });
    }
</script>
</body>
</html>
