<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Bác Sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .header-bg { background-color: #0d6efd; color: white; padding: 15px; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<div class="header-bg d-flex justify-content-between align-items-center mb-4 shadow-sm">
    <h4 class="m-0">Hệ Thống Quản Lý Bệnh Viện - Bác Sĩ</h4>
    <div>
        <span id="doctorNameDisplay" class="me-3 fw-bold"></span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Đăng Xuất</button>
    </div>
</div>

<div class="container-fluid px-4">
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-lichkham" type="button">1. Lịch Khám</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-benhnhan" type="button">2. Hồ Sơ Bệnh Nhân</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="btn-tab-kedon" data-bs-toggle="tab" data-bs-target="#tab-kedon" type="button">3. Kê Đơn Thuốc</button>
        </li>
    </ul>

    <div class="tab-content" id="myTabContent">

        <div class="tab-pane fade show active" id="tab-lichkham" role="tabpanel">
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover table-bordered text-center align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã Phiếu</th>
                            <th>Mã BN</th>
                            <th>Ngày Khám</th>
                            <th>Giờ Khám</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody id="appointmentTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-benhnhan" role="tabpanel">
            <div class="d-flex justify-content-end mb-3">
                <button class="btn btn-success" onclick="openAddModal()">+ Thêm Bệnh Nhân</button>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover table-bordered text-center align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã BN</th>
                            <th>Họ Tên</th>
                            <th>CCCD</th>
                            <th>Số ĐT</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody id="patientTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-kedon" role="tabpanel">
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm border-primary">
                        <div class="card-header bg-primary text-white fw-bold">Thông Tin Kê Đơn</div>
                        <div class="card-body">
                            <label class="form-label fw-bold">Mã Phiếu Khám</label>
                            <input type="text" id="kd-maPhieu" class="form-control mb-3" placeholder="PDK01" readonly>

                            <label class="form-label fw-bold">Chọn Thuốc</label>
                            <select id="kd-selectThuoc" class="form-select mb-3">
                                <option value="">-- Kho thuốc trống --</option>
                            </select>

                            <div class="row mb-3">
                                <div class="col-5">
                                    <label class="form-label">Số lượng</label>
                                    <input type="number" id="kd-soLuong" class="form-control" value="1" min="1">
                                </div>
                                <div class="col-7">
                                    <label class="form-label">Cách dùng</label>
                                    <input type="text" id="kd-lieuLuong" class="form-control" placeholder="Sáng 1 viên">
                                </div>
                            </div>
                            <button class="btn btn-outline-primary w-100 fw-bold" onclick="addThuocToTable()">
                                &#8594; Đẩy Vào Đơn Thuốc
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white fw-bold">Danh Sách Thuốc Đã Chọn</div>
                        <div class="card-body">
                            <table class="table table-bordered text-center align-middle">
                                <thead class="bg-light">
                                <tr>
                                    <th>Mã Thuốc</th>
                                    <th>Tên Thuốc</th>
                                    <th>Số Lượng</th>
                                    <th>Liều Lượng</th>
                                    <th>Xóa</th>
                                </tr>
                                </thead>
                                <tbody id="kd-tableBody">
                                <tr><td colspan="5" class="text-muted">Chưa có thuốc nào trong đơn</td></tr>
                                </tbody>
                            </table>
                            <button class="btn btn-success w-100 fw-bold mt-2" onclick="saveDonThuoc()">
                                LƯU VÀ XUẤT ĐƠN THUỐC
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="patientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Bệnh Nhân</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="patientForm">
                    <input type="text" class="form-control mb-2" id="maBN" placeholder="Mã BN">
                    <input type="text" class="form-control mb-2" id="hoTen" placeholder="Họ Tên">
                    <input type="text" class="form-control mb-2" id="cccd" placeholder="CCCD">
                    <input type="text" class="form-control mb-2" id="sdt" placeholder="Số điện thoại">
                    <input type="hidden" id="isEditMode" value="false">
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="savePatient()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_PHIEU = 'http://localhost:8080/api/phieu-kham';
    const API_BENHNHAN = 'http://localhost:8080/api/benh-nhan';
    const API_DONTHUOC = 'http://localhost:8080/api/don-thuoc';

    let patientModal;
    let selectedThuocList = []; // Mảng tạm chứa thuốc đang kê

    document.addEventListener("DOMContentLoaded", () => {
        const doctorName = localStorage.getItem('userName');
        if (doctorName) document.getElementById('doctorNameDisplay').innerText = doctorName; // Đã bỏ "BS."

        patientModal = new bootstrap.Modal(document.getElementById('patientModal'));

        loadAppointments();
        loadPatients();
        loadListThuoc();
    });

    // --- PHẦN 1: LỊCH KHÁM ---
    function loadAppointments() {
        fetch(API_PHIEU).then(res => res.json()).then(data => {
            const tbody = document.getElementById('appointmentTableBody');
            tbody.innerHTML = '';
            data.forEach(phieu => {
                let badgeClass = phieu.trangThai === 'Chờ khám' ? 'bg-warning text-dark' : 'bg-secondary';
                if(phieu.trangThai.includes('Đã khám')) badgeClass = 'bg-success';

                let maP = phieu.maPhieuDK || phieu.MaPhieuDK;
                let maB = phieu.maBN || phieu.MaBN;

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${maP}</td>
                        <td>${maB}</td>
                        <td>${phieu.ngayKham ? phieu.ngayKham.split('T')[0] : ''}</td>
                        <td>${phieu.gioKham || ''}</td>
                        <td>
                            <select class="form-select form-select-sm" onchange="updateStatus('${maP}', this.value)">
                                <option value="${phieu.trangThai}" hidden>${phieu.trangThai}</option>
                                <option value="Chờ khám">Chờ khám</option>
                                <option value="Đã khám xong">Đã khám xong</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="chuyenSangTabKeDon('${maP}')">Kê Đơn</button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function updateStatus(maPhieu, trangThaiMoi) {
        fetch(`${API_PHIEU}/update-status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ maPhieu: maPhieu, trangThai: trangThaiMoi })
        }).then(() => loadAppointments());
    }

    // --- HÀM CẦU NỐI: TỰ ĐỘNG CHUYỂN TAB KÊ ĐƠN ---
    function chuyenSangTabKeDon(maPhieu) {
        // Điền mã phiếu
        document.getElementById('kd-maPhieu').value = maPhieu;
        // Kích hoạt tab 3
        const tabKeDon = new bootstrap.Tab(document.getElementById('btn-tab-kedon'));
        tabKeDon.show();
    }

    // --- PHẦN 2: KÊ ĐƠN THUỐC ---
    function loadListThuoc() {
        fetch(`${API_DONTHUOC}/thuoc`)
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('kd-selectThuoc');
            select.innerHTML = '<option value="">-- Chọn thuốc --</option>';
            data.forEach(t => {
                let ma = t.maThuoc || t.MaThuoc;
                let ten = t.tenThuoc || t.TenThuoc;
                select.innerHTML += `<option value="${ma}">${ten}</option>`;
            });
        }).catch(() => console.log("Chưa có API thuốc hoặc kho thuốc trống"));
    }

    function addThuocToTable() {
        const select = document.getElementById('kd-selectThuoc');
        const maThuoc = select.value;
        const tenThuoc = select.options[select.selectedIndex].text;
        const soLuong = document.getElementById('kd-soLuong').value;
        const lieuLuong = document.getElementById('kd-lieuLuong').value;

        if(!maThuoc || !soLuong) return alert("Vui lòng chọn thuốc và nhập số lượng!");

        // Kiểm tra xem thuốc đã có trong đơn chưa
        const existIndex = selectedThuocList.findIndex(t => t.maThuoc === maThuoc);
        if(existIndex !== -1) {
            alert("Thuốc này đã có trong đơn!"); return;
        }

        selectedThuocList.push({ maThuoc, tenThuoc, soLuong, lieuLuong });
        renderKDTable();
    }

    function renderKDTable() {
        const tbody = document.getElementById('kd-tableBody');
        tbody.innerHTML = '';
        if(selectedThuocList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted">Chưa có thuốc nào trong đơn</td></tr>';
            return;
        }
        selectedThuocList.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.maThuoc}</td>
                    <td class="fw-bold text-primary">${item.tenThuoc}</td>
                    <td>${item.soLuong}</td>
                    <td>${item.lieuLuong}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="selectedThuocList.splice(${index},1); renderKDTable();">Xóa</button></td>
                </tr>
            `;
        });
    }

    function saveDonThuoc() {
        const maPhieuKham = document.getElementById('kd-maPhieu').value;
        if(!maPhieuKham) return alert("Vui lòng chọn một Phiếu Khám (Từ Tab Lịch Khám) để kê đơn!");
        if(selectedThuocList.length === 0) return alert("Đơn thuốc đang trống!");

        fetch(`${API_DONTHUOC}/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                maPhieuKham: maPhieuKham,
                thuocList: selectedThuocList
            })
        })
        .then(async res => {
            const text = await res.text();
            if (res.ok) {
                alert(text);
                selectedThuocList = []; // Xóa sạch bảng sau khi lưu
                renderKDTable();
                document.getElementById('kd-maPhieu').value = '';
            } else {
                alert("Lỗi: " + text);
            }
        }).catch(() => alert("Lỗi kết nối máy chủ!"));
    }

    // --- PHẦN 3: BỆNH NHÂN (CRUD) ---
    function loadPatients() {
        fetch(API_BENHNHAN).then(res => res.json()).then(data => {
            const tbody = document.getElementById('patientTableBody');
            tbody.innerHTML = '';
            data.forEach(bn => {
                let ma = bn.maBN || bn.MaBN;
                tbody.innerHTML += `
                    <tr>
                        <td>${ma || ''}</td>
                        <td>${bn.hoTen || ''}</td>
                        <td>${bn.cccd || ''}</td>
                        <td>${bn.sdt || ''}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="openEditModal('${ma}', '${bn.hoTen}', '${bn.cccd}', '${bn.sdt}')">Sửa</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePatient('${ma}')">Xóa</button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = "Thêm Bệnh Nhân";
        document.getElementById('patientForm').reset();
        document.getElementById('maBN').readOnly = false;
        document.getElementById('isEditMode').value = "false";
        patientModal.show();
    }

    function openEditModal(maBN, hoTen, cccd, sdt) {
        document.getElementById('modalTitle').innerText = "Cập Nhật";
        document.getElementById('maBN').value = maBN;
        document.getElementById('hoTen').value = hoTen !== 'undefined' ? hoTen : '';
        document.getElementById('cccd').value = cccd !== 'undefined' ? cccd : '';
        document.getElementById('sdt').value = sdt !== 'undefined' ? sdt : '';
        document.getElementById('maBN').readOnly = true;
        document.getElementById('isEditMode').value = "true";
        patientModal.show();
    }

    function savePatient() {
        const maBN = document.getElementById('maBN').value.trim();
        const payload = {
            maBN: maBN,
            hoTen: document.getElementById('hoTen').value.trim(),
            cccd: document.getElementById('cccd').value.trim(),
            sdt: document.getElementById('sdt').value.trim()
        };
        const isEdit = document.getElementById('isEditMode').value === "true";
        fetch(isEdit ? `${API_BENHNHAN}/edit/${maBN}` : `${API_BENHNHAN}/add`, {
            method: isEdit ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => { patientModal.hide(); loadPatients(); });
    }

    function deletePatient(id) {
        if (confirm("Xóa bệnh nhân " + id + "?")) {
            fetch(`${API_BENHNHAN}/delete/${id}`, { method: 'DELETE' }).then(() => loadPatients());
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
