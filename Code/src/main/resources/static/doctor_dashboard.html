<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển Bác Sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Hệ Thống Quản Lý Bệnh Viện - Dành Cho Bác Sĩ</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Đăng Xuất</button>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white">
            <h5 class="mb-0">Danh Sách Bệnh Nhân Đặt Lịch</h5>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Mã Phiếu</th>
                    <th>Mã Bệnh Nhân</th>
                    <th>Ngày Khám</th>
                    <th>Giờ Khám</th>
                    <th>Trạng Thái Hiện Tại</th>
                    <th>Cập Nhật Trạng Thái</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if(!localStorage.getItem('role') || localStorage.getItem('role') === 'BENHNHAN') {
        window.location.href = '/login.html';
    }

    loadData();

    function loadData() {
        fetch('/api/phieu-kham')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(p => {
                    // Xác định màu sắc cho Badge
                    let badgeColor = 'bg-secondary';
                    if(p.trangThai === 'Chờ Khám') badgeColor = 'bg-warning text-dark';
                    if(p.trangThai === 'Đã Đến') badgeColor = 'bg-info text-dark';
                    if(p.trangThai === 'Khám Xong') badgeColor = 'bg-success';
                    if(p.trangThai === 'Đã Hủy') badgeColor = 'bg-danger';

                    html += `
                        <tr class="${p.trangThai === 'Đã Hủy' ? 'text-muted' : ''}">
                            <td><b>${p.maPhieuDK}</b></td>
                            <td>${p.maBN}</td>
                            <td>${p.ngayKham}</td>
                            <td>${p.gioKham}</td>
                            <td><span class="badge ${badgeColor}">${p.trangThai}</span></td>
                            <td>
                                <select class="form-select form-select-sm" onchange="updateStatus('${p.maPhieuDK}', this.value)" ${p.trangThai === 'Đã Hủy' || p.trangThai === 'Khám Xong' ? 'disabled' : ''}>
                                    <option value="Chờ Khám" ${p.trangThai === 'Chờ Khám' ? 'selected' : ''}>Chờ Khám</option>
                                    <option value="Đã Đến" ${p.trangThai === 'Đã Đến' ? 'selected' : ''}>Đã Đến</option>
                                    <option value="Khám Xong" ${p.trangThai === 'Khám Xong' ? 'selected' : ''}>Khám Xong</option>
                                    <option value="Đã Hủy" ${p.trangThai === 'Đã Hủy' ? 'selected' : ''}>Đã Hủy</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('tableBody').innerHTML = html;
            });
    }

    function updateStatus(id, newStatus) {
        fetch('/api/phieu-kham/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ maPhieuDK: id, trangThai: newStatus })
        }).then(() => {
            loadData(); // Tải lại bảng để cập nhật màu sắc lập tức
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
