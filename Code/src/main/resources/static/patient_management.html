<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bệnh Nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .header-bg { background-color: #0d6efd; color: white; padding: 15px; }
    </style>
</head>
<body class="bg-light">

<div class="header-bg d-flex justify-content-between align-items-center mb-4">
    <h4 class="m-0">Hệ Thống Quản Lý - Bệnh Nhân</h4>
    <div>
        <span id="doctorNameDisplay" class="me-3 fw-bold"></span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Đăng Xuất</button>
    </div>
</div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Danh Sách Bệnh Nhân</h3>
        <button class="btn btn-success" onclick="openAddModal()">+ Thêm Bệnh Nhân Mới</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Mã BN</th>
                    <th>Họ Tên</th>
                    <th>CCCD</th>
                    <th>Số Điện Thoại</th>
                    <th>Hành Động</th>
                </tr>
                </thead>
                <tbody id="patientTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="patientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Thêm Bệnh Nhân</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="patientForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã Bệnh Nhân</label>
                        <input type="text" class="form-control" id="maBN" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và Tên</label>
                        <input type="text" class="form-control" id="hoTen" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số CCCD</label>
                        <input type="text" class="form-control" id="cccd">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số Điện Thoại</label>
                        <input type="text" class="form-control" id="sdt">
                    </div>
                    <input type="hidden" id="isEditMode" value="false">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary" onclick="savePatient()">Lưu Thông Tin</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/benh-nhan';
    let patientModal;

    // Chạy ngay khi load trang
    document.addEventListener("DOMContentLoaded", () => {
        // Hiển thị tên bác sĩ (lấy từ lúc đăng nhập)
        const doctorName = localStorage.getItem('userName');
        if (doctorName) document.getElementById('doctorNameDisplay').innerText = "BS. " + doctorName;

        patientModal = new bootstrap.Modal(document.getElementById('patientModal'));
        loadPatients(); // Gọi API lấy danh sách
    });

    // 1. LẤY DANH SÁCH (READ)
    function loadPatients() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('patientTableBody');
                tbody.innerHTML = ''; // Xóa sạch bảng cũ

                data.forEach(bn => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold">${bn.maBN || ''}</td>
                            <td>${bn.hoTen || ''}</td>
                            <td>${bn.cccd || ''}</td>
                            <td>${bn.sdt || ''}</td>
                            <td>
                                <button class="btn btn-warning btn-sm me-2" onclick="openEditModal('${bn.maBN}', '${bn.hoTen}', '${bn.cccd}', '${bn.sdt}')">Sửa</button>
                                <button class="btn btn-danger btn-sm" onclick="deletePatient('${bn.maBN}')">Xóa</button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => console.error("Lỗi tải danh sách:", err));
    }

    // 2. MỞ FORM THÊM MỚI
    function openAddModal() {
        document.getElementById('modalTitle').innerText = "Thêm Bệnh Nhân Mới";
        document.getElementById('patientForm').reset();
        document.getElementById('maBN').readOnly = false; // Cho phép nhập Mã
        document.getElementById('isEditMode').value = "false";
        patientModal.show();
    }

    // 3. MỞ FORM SỬA (Điền sẵn dữ liệu cũ)
    function openEditModal(maBN, hoTen, cccd, sdt) {
        document.getElementById('modalTitle').innerText = "Cập Nhật Thông Tin";

        // Cẩn thận với chữ 'undefined' hoặc 'null' khi chuyển thành chuỗi
        document.getElementById('maBN').value = maBN;
        document.getElementById('hoTen').value = hoTen !== 'undefined' ? hoTen : '';
        document.getElementById('cccd').value = cccd !== 'undefined' ? cccd : '';
        document.getElementById('sdt').value = sdt !== 'undefined' ? sdt : '';

        document.getElementById('maBN').readOnly = true; // Không cho sửa Mã
        document.getElementById('isEditMode').value = "true";
        patientModal.show();
    }

    // 4. LƯU THÔNG TIN (Gộp chung Thêm & Sửa)
    function savePatient() {
        const maBN = document.getElementById('maBN').value.trim();
        const hoTen = document.getElementById('hoTen').value.trim();
        const cccd = document.getElementById('cccd').value.trim();
        const sdt = document.getElementById('sdt').value.trim();
        const isEditMode = document.getElementById('isEditMode').value === "true";

        if (!maBN || !hoTen) {
            alert("Vui lòng nhập Mã BN và Họ Tên!");
            return;
        }

        const payload = { maBN, hoTen, cccd, sdt };
        const endpoint = isEditMode ? `${API_URL}/edit/${maBN}` : `${API_URL}/add`;
        const method = isEditMode ? 'PUT' : 'POST';

        fetch(endpoint, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(async (res) => {
            const text = await res.text(); // Đọc dữ liệu dạng chữ (vì Java đang trả về String)
            if (res.ok) {
                alert(text);
                patientModal.hide();
                loadPatients(); // Tải lại bảng
            } else {
                alert("Lỗi: " + text);
            }
        })
        .catch(err => alert("Không thể kết nối đến máy chủ!"));
    }

    // 5. XÓA BỆNH NHÂN (DELETE)
    function deletePatient(id) {
        if (confirm(`Bạn có chắc chắn muốn xóa bệnh nhân mã ${id} không?`)) {
            fetch(`${API_URL}/delete/${id}`, { method: 'DELETE' })
            .then(async (res) => {
                const text = await res.text();
                if (res.ok) {
                    alert(text);
                    loadPatients();
                } else {
                    alert("Lỗi: " + text);
                }
            })
            .catch(err => alert("Không thể kết nối đến máy chủ!"));
        }
    }

    // 6. ĐĂNG XUẤT
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
